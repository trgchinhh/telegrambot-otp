<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo Otp Telegram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Vui lòng điền vào form sau !</h2>
        <form id="loginform">
            <div id="userfield" class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Nhập tên đăng nhập">
            </div>
            
            <div id="passwordfield" class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Nhập mật khẩu">
                    <button type="button" id="showhidepassword" title="Ẩn/Hiện mật khẩu">Ẩn/Hiện</button>
                </div>
            </div>
            
            <div id="otpfield" class="input-group" style="display: none;">
                <label for="otp">Mã xác thực OTP</label>
                <input type="text" name="otp" id="otp" placeholder="Nhập mã OTP gồm 6 chữ số">
            </div>
            
            <div class="button-group">
                <button type="submit" id="loginbutton" class="btn btn-primary">Tiếp tục</button>
                <button type="button" id="confirmbutton" class="btn btn-success" style="display: none;">Xác nhận OTP</button>
            </div>
        </form> 
    </div>

    <script src="script.js"></script>
</body>
</html>
